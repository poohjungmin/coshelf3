name: Send expiry notifications

on:
  # 정각/15분/30분/45분은 전 세계 스케줄 워크플로가 몰리는 혼잡 시간대라
  # GitHub가 지연시키거나 건너뛰는 경우가 흔하다(GitHub 공식 권장사항:
  # 정시를 피해서 스케줄을 잡을 것). 4,19,34,49분으로 어긋나게 잡는다.
  schedule:
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch: {}

# 스케줄 실행과 수동 실행이 겹치면 같은 기기를 동시에 처리해 중복 발송이나
# notifiedDates 갱신 유실이 생길 수 있으므로, 겹치는 실행은 큐에 세워둔다
# (건너뛰지 않고 순서대로 실행 - cancel-in-progress: false).
concurrency:
  group: send-notifications
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: notify
        run: npm install

      - name: Send due notifications
        working-directory: notify
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node send-notifications.js
